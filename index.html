<html lang="en">
<head>

  <style>
    :root{--known-dark:#042a27;--known-accent:#edfb70;--known-cream:#f5f5f0;--known-light:#ebebe2;--known-tan:#d6d4b9;--known-white:#fff;--radius:12px;--radius-lg:20px;--radius-pill:800px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Instrument Sans',sans-serif;background:var(--known-cream);color:var(--known-dark);min-height:100vh}
    .nav{background:var(--known-white);border-bottom:1px solid var(--known-light);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;letter-spacing:.5px;text-transform:uppercase}
    .nav-brand svg{width:28px;height:28px}
    .nav-right{display:flex;align-items:center;gap:16px}
    .nav-meta{font-size:13px;color:rgba(4,42,39,.4)}
    .nav-badge{display:inline-flex;align-items:center;gap:6px;background:var(--known-accent);color:var(--known-dark);padding:6px 16px;border-radius:var(--radius-pill);font-weight:600;font-size:13px}
    .nav-badge .dot{width:8px;height:8px;background:var(--known-dark);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .main{max-width:1200px;margin:0 auto;padding:32px 40px 60px}
    .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px}
    .header h1{font-size:32px;font-weight:700;line-height:1.2}
    .header .subtitle{font-size:15px;color:rgba(4,42,39,.5);margin-top:4px}
    .header-right{text-align:right}
    .report-date{font-size:14px;color:rgba(4,42,39,.5)}
    .claim-id{font-size:13px;font-family:monospace;background:var(--known-light);padding:4px 10px;border-radius:6px;margin-top:4px;display:inline-block}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
    .stat-card{background:var(--known-white);border-radius:var(--radius-lg);padding:24px;border:1px solid var(--known-light)}
    .stat-card.highlight{background:var(--known-dark);color:var(--known-cream);border:none}
    .stat-card.green{background:#065f46;color:#d1fae5;border:none}
    .stat-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;opacity:.6;margin-bottom:8px}
    .stat-value{font-size:32px;font-weight:700;line-height:1}
    .stat-sub{font-size:13px;margin-top:8px;opacity:.6}
    .stat-card.highlight .stat-label,.stat-card.green .stat-label{color:rgba(255,255,255,.7);opacity:1}
    .stat-card.highlight .stat-sub{color:var(--known-accent);opacity:.7}
    .stat-card.green .stat-sub{color:#6ee7b7;opacity:.8}
    .section{background:var(--known-white);border-radius:var(--radius-lg);padding:28px;margin-bottom:24px;border:1px solid var(--known-light)}
    .section h2{font-size:18px;font-weight:600;margin-bottom:20px}
    .progress-bar-container{background:var(--known-light);border-radius:var(--radius-pill);height:32px;overflow:hidden;display:flex;margin-bottom:16px}
    .progress-segment{height:100%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
    .seg-ieepa{background:var(--known-dark);color:var(--known-accent)}
    .seg-301{background:#1a5c58;color:var(--known-accent)}
    .seg-std{background:var(--known-light);color:rgba(4,42,39,.5)}
    .legend{display:flex;gap:24px;flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
    .legend-dot{width:12px;height:12px;border-radius:4px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
    .liq-row{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--known-light)}
    .liq-row:last-child{border-bottom:none}
    .liq-date-label{font-size:20px;font-weight:700}
    .liq-date-sub{font-size:13px;opacity:.5;margin-top:2px}
    .liq-badge{padding:6px 14px;border-radius:var(--radius-pill);font-size:13px;font-weight:600}
    .liq-badge.past{background:#d1fae5;color:#065f46}
    .liq-badge.soon{background:#fef3c7;color:#92400e}
    .liq-badge.future{background:#e0f2fe;color:#1e40af}
    .fact-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--known-light);font-size:14px}
    .fact-row:last-child{border-bottom:none}
    .fact-label{opacity:.6}
    .fact-value{font-weight:600}
    .table-section{background:var(--known-white);border-radius:var(--radius-lg);padding:28px;border:1px solid var(--known-light);overflow-x:auto;margin-bottom:24px}
    .table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
    .table-header h2{font-size:18px;font-weight:600}
    .table-tabs{display:flex;gap:4px;background:var(--known-light);padding:3px;border-radius:var(--radius-pill)}
    .table-tab{padding:6px 14px;border-radius:var(--radius-pill);font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--known-dark);font-family:inherit}
    .table-tab.active{background:var(--known-white);box-shadow:0 1px 3px rgba(0,0,0,.08)}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:10px 12px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:rgba(4,42,39,.5);border-bottom:2px solid var(--known-light)}
    th.r,td.r{text-align:right}
    td{padding:12px;border-bottom:1px solid var(--known-light)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--known-cream)}
    .badge{display:inline-flex;padding:4px 10px;border-radius:var(--radius-pill);font-size:12px;font-weight:600}
    .badge-pending{background:#fef3c7;color:#92400e}
    .badge-paid{background:#d1fae5;color:#065f46}
    .badge-notfiled{background:var(--known-light);color:rgba(4,42,39,.5)}
    .mono{font-family:'SF Mono','Fira Code',monospace;font-size:12px}
    .footer{text-align:center;padding:32px;font-size:13px;color:rgba(4,42,39,.35)}
    @media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}.main{padding:20px}.nav{padding:16px 20px}}
    @media(max-width:500px){.stats-grid{grid-template-columns:1fr}.header{flex-direction:column;gap:12px}.stat-value{font-size:24px}}
  </style>
</head>

    document.getElementById('liq-section').innerHTML='<h2>Liquidation Dates</h2>'+liqHtml;

    var im=D.importerDetails;
    var lsHtml=Object.keys(im.liqStatuses).map(function(k){return k+': '+im.liqStatuses[k]}).join(' / ');
    document.getElementById('importer-section').innerHTML='<h2>Importer Details</h2><div class="fact-row"><span class="fact-label">Importer</span><span class="fact-value">'+im.name+'</span></div><div class="fact-row"><span class="fact-label">Importer Number</span><span class="fact-value mono">'+im.number+'</span></div><div class="fact-row"><span class="fact-label">ACE ID</span><span class="fact-value mono">'+im.aceId+'</span></div><div class="fact-row"><span class="fact-label">Bond Number</span><span class="fact-value mono">'+im.bond+'</span></div><div class="fact-row"><span class="fact-label">Total Entries</span><span class="fact-value">'+im.totalEntries+'</span></div><div class="fact-row"><span class="fact-label">Total Tariff Lines</span><span class="fact-value">'+im.totalLines.toLocaleString()+'</span></div><div class="fact-row"><span class="fact-label">Total Goods Value</span><span class="fact-value">'+fmtK(im.totalGoodsValue)+'</span></div><div class="fact-row"><span class="fact-label">Liquidation Status</span><span class="fact-value" style="font-size:12px">'+lsHtml+'</span></div>';

    function renderEntries(filter){
      var filtered=D.entries;
      var filters=['all','paid','pending','notfiled'];if(typeof filter==='number')filter=filters[filter];if(filter=='paid')filtered=D.entries.filter(function(e){return e.refundAmount!==null});
      else if(filter=='pending')filtered=D.entries.filter(function(e){return e.capeStatus==='CAPE Accepted'&&e.refundAmount===null});
      else if(filter=='notfiled')filtered=D.entries.filter(function(e){return e.capeStatus==='Not Filed'});
      var pc=D.entries.filter(function(e){return e.refundAmount!==null}).length;
      var pn=D.entries.filter(function(e){return e.capeStatus==='CAPE Accepted'&&e.refundAmount===null}).length;
      var nf=D.entries.filter(function(e){return e.capeStatus==='Not Filed'}).length;
      var totals={td:0,ie:0,s3:0,st:0};
      var rows=filtered.map(function(e){
        totals.td+=e.totalDuty;totals.ie+=e.ieepaDuty;totals.s3+=e.s301Duty;totals.st+=e.stdDuty;
        var badge='';
        if(e.refundAmount!==null)badge='<span class="badge badge-paid">Refunded</span>';
        else if(e.capeStatus==='CAPE Accepted')badge='<span class="badge badge-pending">Pending</span>';
        else badge='<span class="badge badge-notfiled">Not in Claim</span>';
        return '<tr><td class="mono">'+e.entry+'</td><td>'+e.entryDate+'</td><td>'+e.liqDate+'</td><td>'+badge+'</td><td class="r">'+fmt(e.totalDuty)+'</td><td class="r">'+fmt(e.ieepaDuty)+'</td><td class="r">'+(e.s301Duty>0?fmt(e.s301Duty):'&mdash;')+'</td><td class="r">'+fmt(e.stdDuty)+'</td></tr>';
      }).join('');
      document.getElementById('table-section').innerHTML='<div class="table-header"><h2>Entry Detail</h2><div class="table-tabs"><button class="table-tab '+(filter=='all'?'active':'')+'" onclick="renderEntries(0)">All ('+D.entries.length+')</button><button class="table-tab '+(filter=='paid'?'active':'')+'" onclick="renderEntries(1)">Refunded ('+pc+')</button><button class="table-tab '+(filter=='pending'?'active':'')+'" onclick="renderEntries(2)">Pending ('+pn+')</button><button class="table-tab '+(filter=='notfiled'?'active':'')+'" onclick="renderEntries(3)">Not in Claim ('+nf+')</button></div></div><table><thead><tr><th>Entry #</th><th>Entry Date</th><th>Liq. Date</th><th>Status</th><th class="r">Total Duty</th><th class="r">IEEPA</th><th class="r">Sec 301</th><th class="r">Standard</th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr style="font-weight:700;border-top:2px solid var(--known-dark)"><td colspan="4">Total ('+filtered.length+' entries)</td><td class="r">'+fmt(totals.td)+'</td><td class="r">'+fmt(totals.ie)+'</td><td class="r">'+fmt(totals.s3)+'</td><td class="r">'+fmt(totals.st)+'</td></tr></tfoot></table>';
    }
    renderEntries('all');
  </script>
</body>
</html>
